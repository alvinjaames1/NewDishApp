<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Dish - RateMyDish</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<nav class="navbar">
  <div class="logo">
    <span class="logo-icon">🍽️</span>
    <span class="logo-text">RateMyDish</span>
  </div>

  <div class="nav-links">
    <a href="/feed.html">Feed</a>
    <a href="/create-dish.html" class="active">Create Dish</a>
    <a href="/search.html">Search</a>
    <a href="/profile.html">Profile</a>
    <button id="logoutBtn" class="logout-btn" type="button">Logout</button>
  </div>
</nav>

<main class="page-shell">
  <section class="page-card create-dish-page">
    <p class="page-eyebrow">Share something delicious</p>
    <h1>Create a Dish</h1>
    <p class="page-subtext">
      Post your best meal so other food lovers can discover and rate it.
    </p>

    <form id="createDishForm" class="dish-form">
      <label for="title">Title</label>
      <input
              type="text"
              id="title"
              placeholder="e.g. Spicy Garlic Ramen"
              required
      />

      <label for="cuisine">Cuisine</label>
      <input
              type="text"
              id="cuisine"
              placeholder="e.g. Japanese"
              required
      />

      <label for="imageFile">Dish Image</label>
      <input
              type="file"
              id="imageFile"
              accept="image/*"
      />

      <label for="imageUrl">Or Image URL</label>
      <input
              type="url"
              id="imageUrl"
              placeholder="https://example.com/dish.jpg"
      />

      <p id="uploadStatus" class="message"></p>

      <label for="description">Description</label>
      <textarea
              id="description"
              rows="5"
              placeholder="Describe the flavor, texture, and presentation..."
              required
      ></textarea>

      <label for="ingredientsText">Ingredients</label>
      <textarea
              id="ingredientsText"
              rows="4"
              placeholder="List ingredients here..."
      ></textarea>

      <label for="recipeText">Recipe / Preparation</label>
      <textarea
              id="recipeText"
              rows="5"
              placeholder="Describe how the dish is made..."
      ></textarea>

      <button type="submit" class="btn create-btn">Create Dish</button>
      <p id="message" class="message"></p>
    </form>
  </section>
</main>

<script src="/js/api.js"></script>
<script src="/js/common.js"></script>
<script src="/js/create-dish.js"></script>
</body>
</html>
